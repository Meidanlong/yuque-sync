openapi: 3.1.0
info:
  title: 语雀 OpenAPI
  summary: 语雀开放 API
  description: ''
  version: 2.0.0
servers:
  - url: https://www.yuque.com
    description: 线上访问地址
components:
  securitySchemes:
    authToken:
      type: apiKey
      description: '使用指南: https://www.yuque.com/yuque/developer/api'
      name: X-Auth-Token
      in: header
  responses:
    '400':
      description: 请求参数非法
    '401':
      description: Token/Scope 未通过鉴权
    '403':
      description: 无操作权限
    '404':
      description: 实体未找到
    '422':
      description: 请求参数校验失败
    '429':
      description: 访问频率超限
    '500':
      description: 内部错误
  requestBodies:
    ApiV2GroupMemberUpdatePut:
      content:
        application/json:
          schema:
            type: object
            properties:
              role:
                type: string
                enum:
                  - 0
                  - 1
                  - 2
                default: 1
                description: |
                  <p>角色<br />
                  (0:管理员, 1:成员, 2:只读成员)</p>
    ApiV2DocCreatePost:
      content:
        application/json:
          schema:
            type: object
            properties:
              slug:
                type: string
                description: |
                  <p>路径</p>
              title:
                type: string
                default: 无标题
                description: |
                  <p>标题</p>
              public:
                type: string
                enum:
                  - 0
                  - 1
                  - 2
                default: 0
                description: |
                  <p>公开性<br />
                  (0:私密, 1:公开, 2:企业内公开)</p>
              format:
                type: string
                enum:
                  - markdown
                  - html
                  - lake
                default: markdown
                description: |
                  <p>内容格式<br />
                  (markdown:Markdown 格式, html:HTML 标准格式, lake:语雀 Lake 格式)</p>
              body:
                type: string
                description: |
                  <p>正文内容</p>
            required:
              - body
    ApiV2DocUpdatePut:
      content:
        application/json:
          schema:
            type: object
            properties:
              slug:
                type: string
                description: |
                  <p>路径</p>
              title:
                type: string
                default: 无标题
                description: |
                  <p>标题</p>
              public:
                type: string
                enum:
                  - 0
                  - 1
                  - 2
                default: 0
                description: |
                  <p>公开性<br />
                  (0:私密, 1:公开, 2:企业内公开)</p>
              format:
                type: string
                enum:
                  - markdown
                  - html
                  - lake
                default: markdown
                description: |
                  <p>内容格式<br />
                  (markdown:Markdown 格式, html:HTML 标准格式, lake:语雀 Lake 格式)</p>
              body:
                type: string
                description: |
                  <p>正文内容</p>
    ApiV2RepoTocUpdatePut:
      content:
        application/json:
          schema:
            type: object
            properties:
              action:
                type: string
                enum:
                  - appendNode
                  - prependNode
                  - editNode
                  - removeNode
                description: >
                  <p>操作<br />

                  (appendNode:尾插, prependNode:头插, editNode:编辑节点,
                  removeNode:删除节点)</p>

                  <ul>

                  <li>action_mode 必填</li>

                  <li>创建场景下不支持同级头插 prependNode</li>

                  <li>删除节点不会删除关联文档</li>

                  <li>删除节点时: action_mode=sibling (删除当前节点), action_mode=child
                  (删除当前节点及子节点)</li>

                  </ul>
              action_mode:
                type: string
                enum:
                  - sibling
                  - child
                description: |
                  <p>操作模式<br />
                  (sibling:同级, child:子级)</p>
              target_uuid:
                type: string
                description: |
                  <p>目标节点 UUID, 不填默认为根节点</p>
                  <ul>
                  <li>获取方式: 调用"获取知识库目录"接口获取</li>
                  </ul>
              node_uuid:
                type: string
                description: |
                  <p>操作节点 UUID [移动/更新/删除必填]</p>
                  <ul>
                  <li>获取方式: 调用"获取知识库目录"接口获取</li>
                  </ul>
              doc_id:
                type: integer
                description: |
                  <p>文档 ID [创建文档必填]</p>
                deprecated: true
              doc_ids:
                type: array
                items:
                  type: integer
                description: |
                  <p>文档 ID 数组 [创建文档必填]</p>
              type:
                type: string
                enum:
                  - DOC
                  - LINK
                  - TITLE
                default: DOC
                description: |
                  <p>节点类型 [创建必填]<br />
                  (DOC:文档, LINK:外链, TITLE:分组)</p>
              title:
                type: string
                description: |
                  <p>节点名称 [创建分组/外链必填]</p>
              url:
                type: string
                description: |
                  <p>节点 URL [创建外链必填]</p>
              open_window:
                type: string
                enum:
                  - 0
                  - 1
                default: 0
                description: |
                  <p>是否新窗口打开 [外链选填]<br />
                  (0:当前页打开, 1:新窗口打开)</p>
              visible:
                type: string
                enum:
                  - 0
                  - 1
                default: 1
                description: |
                  <p>是否可见<br />
                  (0:不可见, 1:可见)</p>
            required:
              - action
    ApiV2RepoCreatePost:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: |
                  <p>名称</p>
              slug:
                type: string
                description: |
                  <p>路径</p>
              description:
                type: string
                description: |
                  <p>简介</p>
              public:
                type: string
                enum:
                  - 0
                  - 1
                  - 2
                default: 0
                description: |
                  <p>公开性<br />
                  (0:私密, 1:公开, 2:企业内公开)</p>
            required:
              - name
              - slug
    ApiV2RepoUpdatePut:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: |
                  <p>名称</p>
              slug:
                type: string
                description: |
                  <p>路径</p>
              description:
                type: string
                description: |
                  <p>简介</p>
              public:
                type: string
                enum:
                  - 0
                  - 1
                  - 2
                default: 0
                description: |
                  <p>公开性<br />
                  (0:私密, 1:公开, 2:企业内公开)</p>
              toc:
                type: string
                description: >
                  <p>目录</p>

                  <p>必须是 Markdown 格式, <code>[名称](文档路径)</code> 示例:</p>

                  <pre data-syntax="markdown"><code class="lang-markdown hljs
                  raw">- [新手指引]()
                    - [语雀是什么](about)
                    - [常见问题](faq)
                  - [基础功能]()
                    - [工作台](dashboard)
                    - [如何设置自定义路径](nkt888)
                  </code></pre>
                deprecated: true
  schemas:
    V2User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: |
            <p>用户 ID</p>
        type:
          type: string
          description: |
            <p>类型<br />
            Always 'User'</p>
          deprecated: true
        login:
          type: string
          description: |
            <p>登录名</p>
        name:
          type: string
          description: |
            <p>昵称</p>
        avatar_url:
          type: string
          description: |
            <p>头像</p>
        books_count:
          type: integer
          description: |
            <p>知识库数量</p>
        public_books_count:
          type: integer
          description: |
            <p>公开的知识库数量</p>
        followers_count:
          type: integer
          description: |
            <p>被关注的人数</p>
        following_count:
          type: integer
          description: |
            <p>关注的人数</p>
        public:
          type: integer
          enum:
            - 0
            - 1
            - 2
          description: |
            <p>公开性<br />
            (0:私密, 1:公开, 2:企业内公开)</p>
        description:
          type: string
          description: |
            <p>介绍</p>
        created_at:
          type: string
          format: date-time
          description: |
            <p>创建时间<br />
            格式: YYYY-MM-DDTHH:mm:ss.sssZ (ISO_8601)</p>
        updated_at:
          type: string
          format: date-time
          description: |
            <p>更新时间<br />
            格式: YYYY-MM-DDTHH:mm:ss.sssZ (ISO_8601)</p>
    V2SearchResult:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: |
            <p>ID</p>
        type:
          type: string
          enum:
            - doc
            - repo
          description: |
            <p>类型<br />
            (doc:文档, repo:知识库)</p>
        title:
          type: string
          description: |
            <p>标题<br />
            <code>&lt;em&gt;&lt;/em&gt;</code> 高亮关键词</p>
        summary:
          type: string
          description: |
            <p>摘要<br />
            <code>&lt;em&gt;&lt;/em&gt;</code> 高亮关键词</p>
        url:
          type: string
          description: |
            <p>访问路径</p>
        info:
          type: string
          description: |
            <p>归属信息</p>
        target:
          oneOf:
            - $ref: '#/components/schemas/V2Doc'
            - $ref: '#/components/schemas/V2Book'
    V2Doc:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: |
            <p>文档 ID</p>
        slug:
          type: string
          description: |
            <p>路径</p>
        title:
          type: string
          description: |
            <p>标题</p>
        description:
          type: string
          description: |
            <p>摘要</p>
        cover:
          type: string
          description: |
            <p>封面</p>
        user_id:
          type: integer
          format: int64
          description: |
            <p>归属用户/团队 ID</p>
        book_id:
          type: integer
          format: int64
          description: |
            <p>归属知识库 ID</p>
        last_editor_id:
          type: integer
          format: int64
          description: |
            <p>最后编辑者 ID</p>
        public:
          type: integer
          enum:
            - 0
            - 1
            - 2
          description: |
            <p>公开性<br />
            (0:私密, 1:公开, 2:企业内公开)</p>
        status:
          type: string
          description: |
            <p>状态<br />
            (0:草稿, 1:发布)</p>
        likes_count:
          type: integer
          description: |
            <p>点赞数</p>
        read_count:
          type: integer
          description: |
            <p>阅读数</p>
            <ul>
            <li>需要传入 <code>optional_properties=hits</code> 获取</li>
            </ul>
        hits:
          type: integer
          description: |
            <p>阅读数</p>
            <ul>
            <li>需要传入 <code>optional_properties=hits</code> 获取</li>
            </ul>
          deprecated: true
        comments_count:
          type: integer
          description: |
            <p>评论数</p>
        word_count:
          type: integer
          description: |
            <p>内容字数</p>
        created_at:
          type: string
          format: date-time
          description: |
            <p>创建时间<br />
            格式: YYYY-MM-DDTHH:mm:ss.sssZ (ISO_8601)</p>
        updated_at:
          type: string
          format: date-time
          description: |
            <p>更新时间<br />
            格式: YYYY-MM-DDTHH:mm:ss.sssZ (ISO_8601)</p>
        content_updated_at:
          type: string
          format: date-time
          description: |
            <p>内容更新时间<br />
            格式: YYYY-MM-DDTHH:mm:ss.sssZ (ISO_8601)</p>
        published_at:
          type: string
          format: date-time
          description: |
            <p>发布时间<br />
            格式: YYYY-MM-DDTHH:mm:ss.sssZ (ISO_8601)</p>
        first_published_at:
          type: string
          format: date-time
          description: |
            <p>首次发布时间<br />
            格式: YYYY-MM-DDTHH:mm:ss.sssZ (ISO_8601)</p>
        book:
          $ref: '#/components/schemas/V2Book'
        last_editor:
          $ref: '#/components/schemas/V2User'
        latest_version_id:
          type: integer
          format: int64
          description: |
            <p>最新已发版本 ID</p>
