            <li>需要传入 <code>optional_properties=latest_version_id</code> 获取</li>
            </ul>
        tags:
          $ref: '#/components/schemas/V2Tag'
    V2Book:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: |
            <p>知识库 ID</p>
        type:
          type: string
          description: |
            <p>类型<br />
            (Book:文档, Design:图集, Sheet:表格, Resource:资源)</p>
        slug:
          type: string
          description: |
            <p>路径</p>
        name:
          type: string
          description: |
            <p>名称</p>
        user_id:
          type: integer
          format: int64
          description: |
            <p>归属用户/团队 ID</p>
        description:
          type: string
          description: |
            <p>简介</p>
        toc_yml:
          type: string
