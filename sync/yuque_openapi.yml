          description: |
            <p>评论数</p>
        word_count:
          type: integer
          description: |
            <p>内容字数</p>
        created_at:
          type: string
          format: date-time
          description: |
            <p>创建时间<br />
            格式: YYYY-MM-DDTHH:mm:ss.sssZ (ISO_8601)</p>
        updated_at:
          type: string
