security:
  - authToken: []
paths:
  /api/v2/hello:
    get:
      tags:
        - user
      summary: 心跳
      description: |
        <p>心跳<br />
        GET /api/v2/hello</p>
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        description: |
                          <p>欢迎消息</p>
        '400': &ref_0
          $ref: '#/components/responses/400'
        '401': &ref_1
          $ref: '#/components/responses/401'
        '403': &ref_2
          $ref: '#/components/responses/403'
        '404': &ref_3
          $ref: '#/components/responses/404'
        '422': &ref_4
          $ref: '#/components/responses/422'
        '429': &ref_5
          $ref: '#/components/responses/429'
        '500': &ref_6
          $ref: '#/components/responses/500'
  /api/v2/user:
    get:
      tags:
        - user
      summary: 获取当前 Token 的用户详情
      description: |
        <p>获取当前 Token 的用户详情<br />
        GET /api/v2/user</p>
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/V2User'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404': *ref_3
        '422': *ref_4
        '429': *ref_5
        '500': *ref_6
  /api/v2/search:
    get:
      tags:
        - search
      summary: 通用搜索
      description: |
        <p>通用搜索<br />
        GET /api/v2/search</p>
        <ul>
        <li>支持分页, PageSize 固定为 20</li>
        </ul>
      parameters:
        - name: q
          in: query
          description: |
            <p>搜索关键词</p>
          required: true
          deprecated: false
          schema:
            type: string
            maxLength: 200
        - name: type
          in: query
          description: |
            <p>搜索类型<br />
            (doc:文档, repo:知识库)</p>
          required: true
          deprecated: false
          schema:
            type: string
            enum:
              - doc
              - repo
        - name: scope
          in: query
          description: |
            <p>搜索范围, 不填默认为搜索当前用户/团队</p>
            <p>[例子]</p>
            <pre><code>- 假设:
              - 团队 URL = https://yuque_domain/group_a
              - 知识库 URL = https://yuque_domain/group_a/book_x
            - 则:
              - 搜索团队里的文档: { type: 'doc', scope: 'group_a' }
              - 搜索团队里的知识库: { type: 'repo', scope: 'group_a' }
              - 搜索知识库里的文档: { type: 'doc', scope: 'group_a/book_x' }
            </code></pre>
          required: false
          deprecated: false
          schema:
            type: string
            maxLength: 400
        - name: page
          in: query
          description: |
            <p>页码 [分页参数]</p>
          required: false
          deprecated: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: |
            <p>页码, 非偏移量 [分页参数]</p>
          required: false
          deprecated: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: strict
          in: query
          description: |
            <p>关键词精确匹配, 不分词</p>
          required: false
          deprecated: false
          schema:
            type: boolean
        - name: related
          in: query
          description: |
            <p>仅搜索与我相关 [筛选条件]</p>
          required: false
          deprecated: false
          schema:
            type: boolean
        - name: creatorId
          in: query
          description: |
            <p>仅搜索指定作者 ID [筛选条件]</p>
          required: false
          deprecated: false
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
