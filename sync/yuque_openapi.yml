        public:
          type: integer
          enum:
            - 0
            - 1
            - 2
          description: |
            <p>公开性<br />
            (0:私密, 1:公开, 2:企业内公开)</p>
        items_count:
          type: integer
          description: |
            <p>文档数量</p>
        likes_count:
          type: integer
          description: |
            <p>点赞数量</p>
        watches_count:
          type: integer
          description: |
            <p>订阅数量</p>
        content_updated_at:
          type: string
          format: date-time
          description: |
            <p>知识库 META 更新时间<br />
            格式: YYYY-MM-DDTHH:mm:ss.sssZ (ISO_8601)</p>
        created_at:
          type: string
          format: date-time
          description: |
            <p>创建时间<br />
            格式: YYYY-MM-DDTHH:mm:ss.sssZ (ISO_8601)</p>
        updated_at:
          type: string
          format: date-time
          description: |
            <p>更新时间<br />
            格式: YYYY-MM-DDTHH:mm:ss.sssZ (ISO_8601)</p>
        user:
          $ref: '#/components/schemas/V2User'
        namespace:
          type: string
          description: |
            <p>完整路径</p>
    V2Tag:
